<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="description" content="Profile for Bessie Coleman"/><meta name="author" content="Collin Orendorff"/><meta name="keywords" content="spots HTML CSS grid flexbox profile post"/><title>Spots</title><link rel="icon" href="favicon.ico"><script defer="defer" src="main.js"></script><link href="main.css" rel="stylesheet"></head><body><div class="page"><header class="header"><img src="e793829a1f9e21f462b1.svg" alt="Spots Logo" class="header__logo"/></header><main class="content"><div class="profile page__section"><img src="1a536b73314cc37564a5.svg" alt="Portrait of Bessie Coleman" class="profile__pfp"/><div class="profile__column"><h1 class="profile__name">Bessie Coleman</h1><p class="profile__description">Civil Aviator</p><button type="button" class="profile__edit-button"><img src="d38272e02bb4f1ab1c37.svg" alt="Edit Icon" class="profile__edit-icon"/>Edit Profile</button></div><button type="button" class="profile__plus-button"><img src="40608da7369d39bc1077.svg" alt="New Post Icon" class="profile__plus-icon"/>New Post</button></div><div class="cards page__section"><ul class="cards__pics"><template id="card-template"><li class="card"><img src="" alt="" class="card__image"/><div class="card__content"><h2 class="card__title"></h2><button type="button" class="card__heart-button"><img src="69134273483c4e5472ba.svg" alt="Like Button" class="card__heart-icon"/></button></div><button type="button" class="card__delete-button"><img src="d19faa0112f44e2b6e01.svg" alt="Delete Button" class="card__bin-icon"/></button></li></template></ul></div></main><footer class="footer page__section"><p class="footer__text">2026 &copy; Spots</p></footer><div class="modal" id="edit-profile-modal"><div class="modal__container"><button type="button" class="modal__close-button"><img src="b6803fef330c8e48dafa.svg" alt="Close Button" class="modal__close-icon"/></button><
